version: '3.8'

services:
  # 后端服务
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: guoyunpms-backend
    restart: unless-stopped
    ports:
      - "3101:3101"  # HTTP API
      - "3102:3102"  # WebSocket
    environment:
      - NODE_ENV=production
      - PORT=3101
      - WS_PORT=3102
      - JWT_SECRET=${JWT_SECRET:-your-secret-key-change-me}
      - JWT_EXPIRES_IN=7d
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - OTA_CTRIP_ENABLED=${OTA_CTRIP_ENABLED:-false}
      - OTA_MEITUAN_ENABLED=${OTA_MEITUAN_ENABLED:-false}
      - OTA_BOOKING_ENABLED=${OTA_BOOKING_ENABLED:-false}
    volumes:
      - ./backend/database:/app/database
      - ./logs:/app/logs
    depends_on:
      - redis
    networks:
      - guoyunpms-network
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3101/api/health', (r) => {process.exit(r.statusCode === 200 ? 0 : 1)})"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # Redis缓存
  redis:
    image: redis:7-alpine
    container_name: guoyunpms-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD:-}
    volumes:
      - redis-data:/data
    networks:
      - guoyunpms-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

  # Nginx反向代理(可选)
  nginx:
    image: nginx:alpine
    container_name: guoyunpms-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
    depends_on:
      - backend
    networks:
      - guoyunpms-network
    profiles:
      - with-nginx  # 使用 docker-compose --profile with-nginx up 启动

  # Prometheus监控(可选)
  prometheus:
    image: prom/prometheus:latest
    container_name: guoyunpms-prometheus
    restart: unless-stopped
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.console.libraries=/usr/share/prometheus/console_libraries'
      - '--web.console.templates=/usr/share/prometheus/consoles'
    networks:
      - guoyunpms-network
    profiles:
      - with-monitoring

  # Grafana可视化(可选)
  grafana:
    image: grafana/grafana:latest
    container_name: guoyunpms-grafana
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_PASSWORD:-admin}
      - GF_USERS_ALLOW_SIGN_UP=false
    volumes:
      - grafana-data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
    depends_on:
      - prometheus
    networks:
      - guoyunpms-network
    profiles:
      - with-monitoring

networks:
  guoyunpms-network:
    driver: bridge

volumes:
  redis-data:
    driver: local
  prometheus-data:
    driver: local
  grafana-data:
    driver: local
